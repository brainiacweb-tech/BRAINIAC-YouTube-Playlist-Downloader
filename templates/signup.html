<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up — BRAINIAC Downloader</title>
<link rel="icon" type="image/png" href="/images/Gemini_Generated_Image_vi53psvi53psvi53-removebg-preview.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #ffffff;
  --border:    #e8e8e8;
  --fg:        #111111;
  --fg2:       #444444;
  --muted:     #888888;
  --red:       #e53935;
  --red-dark:  #b71c1c;
  --red-light: #ffebee;
  --red-mid:   #ef9a9a;
  --radius:    14px;
  --shadow:    0 4px 20px rgba(0,0,0,0.08);
}

body {
  font-family: 'Montserrat', sans-serif;
  background: #fceaea;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  position: relative;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 10% 20%, rgba(229,57,53,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 90% 80%, rgba(183,28,28,0.14) 0%, transparent 55%),
    radial-gradient(ellipse 40% 40% at 60% 10%, rgba(229,57,53,0.10) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

.auth-card {
  position: relative;
  z-index: 1;
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border: 1.5px solid rgba(255,255,255,0.85);
  border-radius: var(--radius);
  box-shadow: 0 8px 40px rgba(229,57,53,0.13), 0 2px 8px rgba(0,0,0,0.07);
  padding: 44px 40px 36px;
  width: 100%;
  max-width: 420px;
}

.auth-logo {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 28px;
  justify-content: center;
}

.auth-logo-img {
  width: 48px;
  height: 48px;
  object-fit: contain;
  border-radius: 10px;
  filter: brightness(0) saturate(100%) invert(26%) sepia(85%) saturate(2290%) hue-rotate(340deg) brightness(100%);
}

.auth-logo-text {
  font-size: 20px;
  font-weight: 900;
  letter-spacing: -0.5px;
  color: var(--fg);
}

.auth-logo-text span { color: var(--red); }

.auth-logo-sub {
  font-size: 8px;
  font-weight: 800;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--red);
  margin-top: 1px;
  line-height: 1;
}

.auth-title {
  font-size: 22px;
  font-weight: 800;
  color: var(--fg);
  text-align: center;
  margin-bottom: 6px;
  letter-spacing: -0.5px;
}

.auth-subtitle {
  font-size: 12px;
  font-weight: 500;
  color: var(--muted);
  text-align: center;
  margin-bottom: 28px;
}

.error-box {
  background: var(--red-light);
  border: 1.5px solid var(--red-mid);
  color: var(--red-dark);
  border-radius: 10px;
  padding: 11px 14px;
  font-size: 12px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 20px;
}

.error-box i { font-size: 15px; flex-shrink: 0; }

.form-group {
  margin-bottom: 16px;
}

.form-label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--fg2);
  margin-bottom: 7px;
}

.input-wrap {
  position: relative;
}

.input-wrap > i {
  position: absolute;
  left: 13px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 17px;
  color: var(--muted);
  pointer-events: none;
}

.form-input {
  width: 100%;
  padding: 11px 42px 11px 40px;
  background: rgba(255,255,255,0.80);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-family: 'Montserrat', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: var(--fg);
  outline: none;
  transition: border-color 0.18s, box-shadow 0.18s;
}

.form-input:focus {
  border-color: var(--red);
  box-shadow: 0 0 0 3px rgba(229,57,53,0.10);
}

.form-input::placeholder { color: var(--muted); }

.eye-toggle {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  color: var(--muted);
  padding: 4px;
  line-height: 1;
  font-size: 1.1rem;
  z-index: 4;
  display: flex;
  align-items: center;
  pointer-events: auto;
}
.eye-toggle i { pointer-events: none; }
.eye-toggle:hover { color: var(--red); }

.hint {
  font-size: 10px;
  font-weight: 500;
  color: var(--muted);
  margin-top: 5px;
  padding-left: 2px;
}

.btn-primary {
  width: 100%;
  padding: 13px;
  background: linear-gradient(135deg, var(--red) 0%, var(--red-dark) 100%);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-family: 'Montserrat', sans-serif;
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: opacity 0.18s, transform 0.12s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-top: 24px;
}

.btn-primary:hover { opacity: 0.90; transform: translateY(-1px); }
.btn-primary:active { transform: translateY(0); }

.auth-footer {
  text-align: center;
  margin-top: 22px;
  font-size: 12px;
  font-weight: 500;
  color: var(--muted);
}

.auth-footer a {
  color: var(--red);
  font-weight: 700;
  text-decoration: none;
}

.auth-footer a:hover { text-decoration: underline; }

@media (max-width: 480px) {
  .auth-card { padding: 32px 22px 28px; }
}

.btn-google {
  width: 100%;
  padding: 11px 14px;
  background: #ffffff;
  border: 1.5px solid #dadce0;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  font-family: 'Montserrat', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: #3c4043;
  cursor: pointer;
  text-decoration: none;
  transition: background 0.18s, box-shadow 0.18s;
  margin-bottom: 18px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}
.btn-google:hover { background: #f8f9fa; box-shadow: 0 2px 8px rgba(0,0,0,0.13); }
.btn-google svg { flex-shrink: 0; }

.or-divider {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 20px;
}
.or-divider::before, .or-divider::after {
  content: '';
  flex: 1;
  height: 1.5px;
  background: var(--border);
}
.or-divider span {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--muted);
}

/* ── Doodles ─────────────────────────────────────────────────── */
.doodles {
  position: fixed; inset: 0; z-index: 0;
  pointer-events: none; overflow: hidden;
}
.doodle {
  position: absolute;
  opacity: 0.12;
  color: #e53935;
  user-select: none;
  animation: floatDoodle ease-in-out infinite;
}
.doodle.spin  { animation: spinDoodle  linear    infinite; }
.doodle.drift { animation: driftDoodle ease-in-out infinite; }
@keyframes floatDoodle {
  0%   { transform: translateY(0px) rotate(0deg); }
  33%  { transform: translateY(-22px) rotate(8deg); }
  66%  { transform: translateY(-10px) rotate(-5deg); }
  100% { transform: translateY(0px) rotate(0deg); }
}
@keyframes spinDoodle {
  0%   { transform: rotate(0deg) scale(1); }
  50%  { transform: rotate(180deg) scale(1.08); }
  100% { transform: rotate(360deg) scale(1); }
}
@keyframes driftDoodle {
  0%   { transform: translateX(0) translateY(0) rotate(-6deg); }
  50%  { transform: translateX(18px) translateY(-14px) rotate(6deg); }
  100% { transform: translateX(0) translateY(0) rotate(-6deg); }
}
.auth-card { position: relative; z-index: 1; }
</style>
</head>

  <div class="auth-card">
    <!-- Logo -->
    <div class="auth-logo">
      <img class="auth-logo-img" src="/images/Gemini_Generated_Image_vi53psvi53psvi53-removebg-preview.png" alt="BRAINIAC">
      <div class="auth-logo-text">
        BRAIN<span>IAC</span>
        <div class="auth-logo-sub">Downloader</div>
      </div>
    </div>

    <h1 class="auth-title">Create an account</h1>
    <p class="auth-subtitle">Join BRAINIAC Downloader — it's free</p>

    {% if error %}
    <div class="error-box">
      <i class="ri-error-warning-fill"></i>
      {{ error }}
    </div>
    {% endif %}

    <a href="/auth/google" class="btn-google">
      <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.859-3.048.859-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/><path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
      Sign up with Google
    </a>

    <div class="or-divider"><span>or</span></div>

    <form method="POST" action="/signup" autocomplete="on">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <div class="input-wrap">
          <i class="ri-user-3-line"></i>
          <input class="form-input" type="text" id="username" name="username"
                 placeholder="Choose a username" autocomplete="username" required>
        </div>
        <p class="hint">At least 3 characters</p>
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <div class="input-wrap">
          <i class="ri-mail-line"></i>
          <input class="form-input" type="email" id="email" name="email"
                 placeholder="Enter your email" autocomplete="email" required>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="input-wrap">
          <i class="ri-lock-2-line"></i>
          <input class="form-input" type="password" id="password" name="password"
                 placeholder="Create a password" autocomplete="new-password" required>
          <button type="button" class="eye-toggle" onclick="togglePw('password',this)" tabindex="-1" aria-label="Show password"><i class="ri-eye-off-line"></i></button>
        </div>
        <p class="hint">At least 6 characters</p>
      </div>

      <div class="form-group">
        <label class="form-label" for="confirm">Confirm Password</label>
        <div class="input-wrap">
          <i class="ri-lock-password-line"></i>
          <input class="form-input" type="password" id="confirm" name="confirm"
                 placeholder="Repeat your password" autocomplete="new-password" required>
          <button type="button" class="eye-toggle" onclick="togglePw('confirm',this)" tabindex="-1" aria-label="Show password"><i class="ri-eye-off-line"></i></button>
        </div>
      </div>

      <button type="submit" class="btn-primary">
        <i class="ri-user-add-line"></i> Create Account
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="/login">Sign in</a>
    </div>
  </div>

<script>
function togglePw(id, btn) {
  var inp = document.getElementById(id);
  var ico = btn.querySelector('i');
  if (inp.type === 'password') {
    inp.type = 'text';
    ico.className = 'ri-eye-line';
  } else {
    inp.type = 'password';
    ico.className = 'ri-eye-off-line';
  }
}
</script>
