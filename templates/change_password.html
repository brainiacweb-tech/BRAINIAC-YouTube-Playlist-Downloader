<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Change Password — BRAINIAC Downloader</title>
<link rel="icon" type="image/png" href="/images/Gemini_Generated_Image_vi53psvi53psvi53-removebg-preview.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --border:    #e8e8e8;
  --fg:        #111111;
  --fg2:       #444444;
  --muted:     #888888;
  --red:       #e53935;
  --red-dark:  #b71c1c;
  --red-light: #ffebee;
  --red-mid:   #ef9a9a;
  --radius:    14px;
}
body {
  font-family: 'Montserrat', sans-serif;
  background: #fceaea;
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 20px; position: relative;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 10% 20%, rgba(229,57,53,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 90% 80%, rgba(183,28,28,0.14) 0%, transparent 55%),
    radial-gradient(ellipse 40% 40% at 60% 10%, rgba(229,57,53,0.10) 0%, transparent 50%);
  pointer-events: none; z-index: 0;
}
.doodles { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
.doodle { position: absolute; opacity: 0.10; color: #e53935; user-select: none; animation: floatDoodle ease-in-out infinite; }
.doodle.spin  { animation: spinDoodle linear infinite; }
.doodle.drift { animation: driftDoodle ease-in-out infinite; }
@keyframes floatDoodle { 0%{transform:translateY(0) rotate(0deg)} 50%{transform:translateY(-18px) rotate(6deg)} 100%{transform:translateY(0) rotate(0deg)} }
@keyframes spinDoodle  { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
@keyframes driftDoodle { 0%{transform:translateX(0) translateY(0) rotate(-5deg)} 50%{transform:translateX(16px) translateY(-12px) rotate(5deg)} 100%{transform:translateX(0) translateY(0) rotate(-5deg)} }
.auth-card {
  position: relative; z-index: 1;
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border: 1.5px solid rgba(255,255,255,0.85);
  border-radius: var(--radius);
  box-shadow: 0 8px 40px rgba(229,57,53,0.13), 0 2px 8px rgba(0,0,0,0.07);
  padding: 44px 40px 36px; width: 100%; max-width: 420px;
}
.auth-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; justify-content: center; }
.auth-logo-img { width: 44px; height: 44px; object-fit: contain; border-radius: 10px; filter: brightness(0) saturate(100%) invert(26%) sepia(85%) saturate(2290%) hue-rotate(340deg) brightness(100%); }
.auth-logo-text { font-size: 20px; font-weight: 900; letter-spacing: -0.5px; color: var(--fg); }
.auth-logo-text span { color: var(--red); }
.auth-logo-sub { font-size: 8px; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; color: var(--red); margin-top: 1px; line-height: 1; }
.auth-title { font-size: 20px; font-weight: 800; color: var(--fg); text-align: center; margin-bottom: 6px; letter-spacing: -0.5px; }
.auth-subtitle { font-size: 12px; font-weight: 500; color: var(--muted); text-align: center; margin-bottom: 24px; }
.alert-box { border-radius: 10px; padding: 11px 14px; font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 8px; margin-bottom: 18px; }
.alert-box i { font-size: 15px; flex-shrink: 0; }
.alert-error   { background: var(--red-light); border: 1.5px solid var(--red-mid); color: var(--red-dark); }
.alert-success { background: #e8f5e9; border: 1.5px solid #a5d6a7; color: #2e7d32; }
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 11px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; color: var(--fg2); margin-bottom: 7px; }
.input-wrap { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.80); border: 1.5px solid var(--border); border-radius: 10px; padding: 0 12px; transition: border-color 0.18s, box-shadow 0.18s; }
.input-wrap:focus-within { border-color: var(--red); box-shadow: 0 0 0 3px rgba(229,57,53,0.10); }
.input-wrap > i { font-size: 17px; color: var(--muted); flex-shrink: 0; pointer-events: none; }
.form-input { flex: 1; min-width: 0; padding: 11px 0; background: transparent; border: none; outline: none; font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 500; color: var(--fg); }
.form-input::placeholder { color: var(--muted); }
.eye-toggle { flex-shrink: 0; background: none; border: none; cursor: pointer; color: var(--muted); padding: 4px 0 4px 4px; font-size: 1.1rem; display: flex; align-items: center; }
.eye-toggle:hover { color: var(--red); }
.btn-primary { width: 100%; padding: 13px; background: linear-gradient(135deg, var(--red) 0%, var(--red-dark) 100%); color: #fff; border: none; border-radius: 10px; font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 800; letter-spacing: 0.5px; cursor: pointer; transition: opacity 0.18s, transform 0.12s; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 4px; }
.btn-primary:hover { opacity: 0.90; transform: translateY(-1px); }
.auth-footer { text-align: center; margin-top: 20px; font-size: 12px; font-weight: 500; color: var(--muted); }
.auth-footer a { color: var(--red); font-weight: 700; text-decoration: none; }
.auth-footer a:hover { text-decoration: underline; }
.google-notice { background: #fff8e1; border: 1.5px solid #ffe082; border-radius: 10px; padding: 12px 14px; font-size: 12px; font-weight: 600; color: #f57f17; display: flex; align-items: center; gap: 8px; margin-bottom: 18px; }
@media (max-width: 480px) {
  .auth-card { padding: 32px 22px 28px; }
  .form-input { font-size: 12px; }
  .input-wrap { gap: 6px; padding: 0 10px; }
  .input-wrap > i { font-size: 15px; }
}
</style>
</head>
<body>

<div class="doodles" aria-hidden="true">
  <svg class="doodle drift" style="width:38px;top:5%;left:8%;animation-duration:9s;animation-delay:0s" viewBox="0 0 24 24" fill="currentColor"><path d="M12 1a4 4 0 0 0-4 4v6a4 4 0 0 0 8 0V5a4 4 0 0 0-4-4zM11 18.944V21H9v1h6v-1h-2v-2.056A7.003 7.003 0 0 0 19 12v-1h-2v1a5 5 0 0 1-10 0v-1H5v1a7.003 7.003 0 0 0 6 6.944z"/></svg>
  <svg class="doodle spin"  style="width:32px;top:20%;left:92%;animation-duration:11s;animation-delay:1s" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a1 1 0 0 1 1 1v10.586l2.293-2.293a1 1 0 1 1 1.414 1.414l-4 4a1 1 0 0 1-1.414 0l-4-4a1 1 0 1 1 1.414-1.414L11 13.586V3a1 1 0 0 1 1-1zM4 20a1 1 0 0 1 1-1h14a1 1 0 1 1 0 2H5a1 1 0 0 1-1-1z"/></svg>
  <svg class="doodle"       style="width:45px;top:70%;left:4%;animation-duration:13s;animation-delay:2s" viewBox="0 0 24 24" fill="currentColor"><path d="M21.543 6.498C22 8.28 22 12 22 12s0 3.72-.457 5.502c-.254.985-.997 1.76-1.938 2.022C17.896 20 12 20 12 20s-5.893 0-7.605-.476c-.945-.266-1.687-1.04-1.938-2.022C2 15.72 2 12 2 12s0-3.72.457-5.502c.254-.985.997-1.76 1.938-2.022C6.107 4 12 4 12 4s5.896 0 7.605.476c.945.266 1.687 1.04 1.938 2.022zM10 15.5l5.5-3.5L10 8.5v7z"/></svg>
  <svg class="doodle drift" style="width:30px;top:85%;left:88%;animation-duration:8s;animation-delay:3s" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/></svg>
  <svg class="doodle"       style="width:40px;top:45%;left:94%;animation-duration:10s;animation-delay:0.5s" viewBox="0 0 24 24" fill="currentColor"><path d="M9 3v10.55A4 4 0 1 0 11 17V7h4V3H9z"/></svg>
  <svg class="doodle drift" style="width:36px;top:60%;left:2%;animation-duration:12s;animation-delay:4s" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm-1.5 14.5v-9l7 4.5-7 4.5z"/></svg>
  <svg class="doodle spin"  style="width:28px;top:10%;left:50%;animation-duration:15s;animation-delay:2s" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3l.01 10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg>
  <svg class="doodle"       style="width:42px;top:30%;left:1%;animation-duration:7s;animation-delay:1s" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3a9 9 0 0 0-9 9v6a3 3 0 0 0 6 0v-4a3 3 0 0 0-3-3V12a6 6 0 1 1 12 0v-.003a3 3 0 0 0-3 3v4a3 3 0 0 0 6 0v-6a9 9 0 0 0-9-9z"/></svg>
</div>

<div class="auth-card">
  <div class="auth-logo">
    <img class="auth-logo-img" src="/images/Gemini_Generated_Image_vi53psvi53psvi53-removebg-preview.png" alt="BRAINIAC">
    <div>
      <div class="auth-logo-text">BRAIN<span>IAC</span></div>
      <div class="auth-logo-sub">Downloader</div>
    </div>
  </div>

  <div class="auth-title">Change Password</div>
  <div class="auth-subtitle">Update your account password</div>

  {% if avatar %}
  <div class="google-notice"><i class="ri-google-fill"></i> Google accounts can't change password here. Manage your password at <a href="https://myaccount.google.com" target="_blank" style="color:inherit;text-decoration:underline;">myaccount.google.com</a>.</div>
  {% else %}

  {% if error %}
  <div class="alert-box alert-error"><i class="ri-error-warning-fill"></i> {{ error }}</div>
  {% endif %}
  {% if success %}
  <div class="alert-box alert-success"><i class="ri-checkbox-circle-fill"></i> {{ success }}</div>
  {% endif %}

  <form method="POST" action="/change-password" autocomplete="off">
    <div class="form-group">
      <label class="form-label" for="current_password">Current Password</label>
      <div class="input-wrap">
        <i class="ri-lock-2-line"></i>
        <input class="form-input" type="password" id="current_password" name="current_password" placeholder="Enter current password" required>
        <button type="button" class="eye-toggle" onclick="togglePw('current_password',this)" tabindex="-1" aria-label="Show"><i class="ri-eye-off-line"></i></button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label" for="new_password">New Password</label>
      <div class="input-wrap">
        <i class="ri-lock-password-line"></i>
        <input class="form-input" type="password" id="new_password" name="new_password" placeholder="Min. 6 characters" required>
        <button type="button" class="eye-toggle" onclick="togglePw('new_password',this)" tabindex="-1" aria-label="Show"><i class="ri-eye-off-line"></i></button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label" for="confirm_password">Confirm New Password</label>
      <div class="input-wrap">
        <i class="ri-lock-check-line"></i>
        <input class="form-input" type="password" id="confirm_password" name="confirm_password" placeholder="Repeat new password" required>
        <button type="button" class="eye-toggle" onclick="togglePw('confirm_password',this)" tabindex="-1" aria-label="Show"><i class="ri-eye-off-line"></i></button>
      </div>
    </div>
    <button type="submit" class="btn-primary"><i class="ri-save-line"></i> Update Password</button>
  </form>
  {% endif %}

  <div class="auth-footer">
    <a href="/"><i class="ri-arrow-left-line"></i> Back to home</a>
  </div>
</div>

<script>
function togglePw(id, btn) {
  var inp = document.getElementById(id);
  var ico = btn.querySelector('i');
  if (inp.type === 'password') { inp.type = 'text'; ico.className = 'ri-eye-line'; }
  else { inp.type = 'password'; ico.className = 'ri-eye-off-line'; }
}
</script>
</body>
</html>
