<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Change Email — BRAINIAC Downloader</title>
<link rel="icon" type="image/png" href="/images/Gemini_Generated_Image_vi53psvi53psvi53-removebg-preview.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --border:#e8e8e8; --fg:#111; --fg2:#444; --muted:#888;
  --red:#e53935; --red-dark:#b71c1c; --red-light:#ffebee; --red-mid:#ef9a9a; --radius:16px;
}
html { background:#fceaea; }
body {
  font-family:'Montserrat',sans-serif; background:#fceaea; min-height:100vh;
  display:flex; flex-direction:column; align-items:center;
  padding:0 16px 60px; position:relative; overflow-x:hidden;
}
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 10% 20%,rgba(229,57,53,.18) 0%,transparent 60%),
    radial-gradient(ellipse 60% 50% at 90% 80%,rgba(183,28,28,.14) 0%,transparent 55%),
    radial-gradient(ellipse 40% 40% at 60% 10%,rgba(229,57,53,.10) 0%,transparent 50%);
}
.doodles{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.doodle{position:absolute;opacity:.09;color:#e53935;animation:floatD ease-in-out infinite alternate;}
.doodle.spin{animation:spinD linear infinite;}
.doodle.drift{animation:driftD ease-in-out infinite alternate;}
@keyframes floatD{0%{transform:translateY(0) rotate(0deg)}100%{transform:translateY(-20px) rotate(8deg)}}
@keyframes spinD{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes driftD{0%{transform:translate(0,0) rotate(-5deg)}100%{transform:translate(14px,-18px) rotate(5deg)}}
.top-nav{position:relative;z-index:10;width:100%;max-width:460px;display:flex;align-items:center;justify-content:space-between;padding:16px 0 10px;}
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--red);text-decoration:none;background:var(--red-light);border:1.5px solid var(--red-mid);padding:6px 14px;border-radius:20px;transition:background .15s,color .15s;}
.back-btn:hover{background:var(--red);color:#fff;border-color:var(--red);}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
.nav-logo img{height:26px;object-fit:contain;filter:brightness(0) saturate(100%) invert(22%) sepia(96%) saturate(2800%) hue-rotate(343deg) brightness(105%);}
.nav-logo span{font-size:13px;font-weight:900;color:var(--red);letter-spacing:-.3px;}
.auth-card{position:relative;z-index:1;background:rgba(255,255,255,.82);backdrop-filter:blur(28px) saturate(180%);border:1.5px solid rgba(255,255,255,.90);border-radius:var(--radius);box-shadow:0 8px 48px rgba(229,57,53,.12),0 2px 10px rgba(0,0,0,.07);padding:36px 40px 32px;width:100%;max-width:460px;}
.auth-logo{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:20px;}
.auth-logo-img{width:46px;height:46px;object-fit:contain;border-radius:12px;filter:brightness(0) saturate(100%) invert(26%) sepia(85%) saturate(2290%) hue-rotate(340deg) brightness(100%);}
.auth-logo-text{font-size:21px;font-weight:900;letter-spacing:-.5px;color:var(--fg);}
.auth-logo-text span{color:var(--red);}
.auth-logo-sub{font-size:8px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:var(--red);margin-top:2px;}
.divider{height:1.5px;background:var(--border);margin:0 -40px 26px;}
.auth-title{font-size:18px;font-weight:800;color:var(--fg);text-align:center;margin-bottom:4px;letter-spacing:-.4px;}
.auth-subtitle{font-size:12px;font-weight:500;color:var(--muted);text-align:center;margin-bottom:24px;}
.current-email-chip{display:inline-flex;align-items:center;gap:7px;background:var(--red-light);border:1.5px solid var(--red-mid);border-radius:20px;padding:7px 14px;font-size:11.5px;font-weight:700;color:var(--red-dark);margin:0 auto 22px;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.current-email-chip i{font-size:15px;flex-shrink:0;}
.alert-box{border-radius:10px;padding:11px 14px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:8px;margin-bottom:18px;}
.alert-box i{font-size:15px;flex-shrink:0;}
.alert-error{background:var(--red-light);border:1.5px solid var(--red-mid);color:var(--red-dark);}
.alert-success{background:#e8f5e9;border:1.5px solid #a5d6a7;color:#2e7d32;}
.form-group{margin-bottom:16px;}
.form-label{display:block;font-size:10.5px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--fg2);margin-bottom:7px;}
.input-wrap{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.88);border:1.5px solid var(--border);border-radius:10px;padding:0 12px;transition:border-color .18s,box-shadow .18s;}
.input-wrap:focus-within{border-color:var(--red);box-shadow:0 0 0 3px rgba(229,57,53,.10);}
.input-wrap>i{font-size:17px;color:var(--muted);flex-shrink:0;pointer-events:none;}
.form-input{flex:1;min-width:0;padding:12px 0;background:transparent;border:none;outline:none;font-family:'Montserrat',sans-serif;font-size:13px;font-weight:500;color:var(--fg);}
.form-input::placeholder{color:var(--muted);}
.eye-toggle{flex-shrink:0;background:none;border:none;cursor:pointer;color:var(--muted);padding:4px 0 4px 4px;font-size:1.1rem;display:flex;align-items:center;}
.eye-toggle:hover{color:var(--red);}
.btn-primary{width:100%;padding:13px;background:linear-gradient(135deg,var(--red) 0%,var(--red-dark) 100%);color:#fff;border:none;border-radius:10px;font-family:'Montserrat',sans-serif;font-size:13px;font-weight:800;letter-spacing:.5px;cursor:pointer;transition:opacity .18s,transform .12s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:6px;}
.btn-primary:hover{opacity:.88;transform:translateY(-1px);}
@media(max-width:480px){.auth-card{padding:28px 20px 24px;}.divider{margin:0 -20px 22px;}.form-input{font-size:12px;}}
</style>
</head>
<body>
<div class="doodles" aria-hidden="true">
  <svg class="doodle drift" style="width:38px;top:5%;left:8%;animation-duration:9s;animation-delay:0s" viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2zm0 4.7-8 5.334L4 8.7V6.297l8 5.333 8-5.333V8.7z"/></svg>
  <svg class="doodle spin"  style="width:32px;top:12%;left:91%;animation-duration:11s;animation-delay:1s" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a1 1 0 0 1 1 1v10.586l2.293-2.293a1 1 0 1 1 1.414 1.414l-4 4a1 1 0 0 1-1.414 0l-4-4a1 1 0 1 1 1.414-1.414L11 13.586V3a1 1 0 0 1 1-1z"/></svg>
  <svg class="doodle"       style="width:45px;top:68%;left:4%;animation-duration:13s;animation-delay:2s" viewBox="0 0 24 24" fill="currentColor"><path d="M21.543 6.498C22 8.28 22 12 22 12s0 3.72-.457 5.502c-.254.985-.997 1.76-1.938 2.022C17.896 20 12 20 12 20s-5.893 0-7.605-.476c-.945-.266-1.687-1.04-1.938-2.022C2 15.72 2 12 2 12s0-3.72.457-5.502c.254-.985.997-1.76 1.938-2.022C6.107 4 12 4 12 4s5.896 0 7.605.476c.945.266 1.687 1.04 1.938 2.022zM10 15.5l5.5-3.5L10 8.5v7z"/></svg>
  <svg class="doodle drift" style="width:30px;top:85%;left:87%;animation-duration:8s;animation-delay:3s" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/></svg>
  <svg class="doodle"       style="width:40px;top:44%;left:93%;animation-duration:10s;animation-delay:0.5s" viewBox="0 0 24 24" fill="currentColor"><path d="M9 3v10.55A4 4 0 1 0 11 17V7h4V3H9z"/></svg>
  <svg class="doodle drift" style="width:36px;top:58%;left:2%;animation-duration:12s;animation-delay:4s" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm-1.5 14.5v-9l7 4.5-7 4.5z"/></svg>
  <svg class="doodle spin"  style="width:28px;top:28%;left:50%;animation-duration:15s;animation-delay:2s" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3l.01 10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg>
  <svg class="doodle"       style="width:42px;top:32%;left:1%;animation-duration:7s;animation-delay:1s" viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2zm-9 11H7v-2h4v2zm6-4H7V9h10v2z"/></svg>
</div>
<nav class="top-nav">
  <a href="/" class="back-btn"><i class="ri-arrow-left-line"></i> Back</a>
  <a href="/" class="nav-logo">
    <img src="/images/Gemini_Generated_Image_vi53psvi53psvi53-removebg-preview.png" alt="logo">
    <span>BRAINIAC</span>
  </a>
</nav>
<div class="auth-card">
  <div class="auth-logo">
    <img class="auth-logo-img" src="/images/Gemini_Generated_Image_vi53psvi53psvi53-removebg-preview.png" alt="BRAINIAC Downloader">
    <div>
      <div class="auth-logo-text">BRAIN<span>IAC</span></div>
      <div class="auth-logo-sub">Downloader</div>
    </div>
  </div>
  <div class="divider"></div>
  <div class="auth-title">Change Email</div>
  <div class="auth-subtitle">Update the email address linked to your account</div>
  <div class="current-email-chip">
    <i class="ri-mail-check-line"></i> {{ current_email }}
  </div>
  {% if error %}
  <div class="alert-box alert-error"><i class="ri-error-warning-fill"></i> {{ error }}</div>
  {% endif %}
  {% if success %}
  <div class="alert-box alert-success"><i class="ri-checkbox-circle-fill"></i> {{ success }}</div>
  {% endif %}
  <form method="POST" action="/change-email" autocomplete="off">
    <div class="form-group">
      <label class="form-label" for="new_email">New Email Address</label>
      <div class="input-wrap">
        <i class="ri-mail-line"></i>
        <input class="form-input" type="email" id="new_email" name="new_email" placeholder="your@newemail.com" required>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label" for="password">Confirm with Password</label>
      <div class="input-wrap">
        <i class="ri-lock-2-line"></i>
        <input class="form-input" type="password" id="password" name="password" placeholder="Enter your current password" required>
        <button type="button" class="eye-toggle" onclick="togglePw('password',this)" tabindex="-1"><i class="ri-eye-off-line"></i></button>
      </div>
    </div>
    <button type="submit" class="btn-primary"><i class="ri-save-line"></i> Update Email</button>
  </form>
</div>
<script>
function togglePw(id,btn){var inp=document.getElementById(id);var ico=btn.querySelector('i');if(inp.type==='password'){inp.type='text';ico.className='ri-eye-line';}else{inp.type='password';ico.className='ri-eye-off-line';}}
</script>
</body>
</html>
